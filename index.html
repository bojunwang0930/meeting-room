<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彰化市公所 會議室借用系統</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;
    --border:#dee2e6;--border-strong:#adb5bd;
    --text:#212529;--text-muted:#6c757d;--text-light:#adb5bd;
    --accent:#1971c2;--accent-bg:#e7f5ff;--accent-text:#1864ab;
    --success:#2f9e44;--success-bg:#ebfbee;
    --warning:#e67700;--warning-bg:#fff3bf;
    --danger:#c92a2a;--danger-bg:#fff5f5;--danger-text:#c92a2a;
    --pro:#6741d9;--pro-bg:#f3f0ff;
    --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  }
  body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
  .modal{background:var(--surface);border-radius:12px;padding:1.5rem;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
  .modal h2{font-size:17px;font-weight:600;margin-bottom:.5rem;display:flex;align-items:center;gap:8px}
  .modal p{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:.6rem}
  .modal ul{font-size:13px;color:var(--text-muted);line-height:1.9;padding-left:1.3rem;margin-bottom:.8rem}
  .modal ul li{margin-bottom:2px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn:hover{background:var(--surface2)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#1864ab}
  .btn.danger{background:var(--danger-bg);color:var(--danger-text);border-color:#ffc9c9}
  .btn.danger:hover{background:#ffe3e3}
  .btn.sm{padding:4px 8px;font-size:11px}
  .btn.warning{background:var(--warning-bg);color:var(--warning);border-color:#ffe066}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:1rem}

  /* Form */
  .field{margin-bottom:10px}
  label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;font-weight:500}
  input,select,textarea{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(25,113,194,.12)}
  textarea{resize:vertical;min-height:60px}

  /* Header */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  .header-left h1{font-size:15px;font-weight:600}
  .header-left p{font-size:11px;color:var(--text-muted);margin-top:1px}
  .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-bg);color:var(--accent-text);border:1px solid #a5d8ff;font-weight:500}
  .badge.admin{background:#fff3bf;color:#7c5000;border-color:#ffe066}

  /* Week nav */
  .week-nav{display:flex;align-items:center;gap:8px;padding:.6rem 1rem;background:var(--surface);border-bottom:1px solid var(--border)}
  .week-nav .week-label{font-size:13px;font-weight:600;flex:1;text-align:center}

  /* Calendar desktop */
  .cal-outer{overflow-x:auto;padding:.75rem}
  .cal-grid{display:grid;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--border);gap:1px}
  .cal-grid.seven{grid-template-columns:56px repeat(7,1fr)}
  .cal-head-row{display:contents}
  .cal-head-corner{background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-light)}
  .cal-head-cell{background:var(--surface2);padding:5px 2px;text-align:center}
  .cal-head-cell .date{font-size:12px;font-weight:600}
  .cal-head-cell .weekday{font-size:10px;color:var(--text-muted);margin-top:1px}
  .cal-head-cell.today{background:var(--accent-bg)}
  .cal-head-cell.today .date{color:var(--accent-text)}
  .cal-head-cell.weekend{background:#fafafa}
  .cal-head-cell.weekend .date{color:var(--text-muted)}
  .cal-head-cell .unlock-btn{font-size:9px;margin-top:3px;padding:2px 5px;border-radius:4px;border:1px solid #ffe066;background:#fff3bf;color:#7c5000;cursor:pointer;display:inline-block}
  .cal-head-cell .ot-label{font-size:9px;color:var(--warning);margin-top:2px}
  .cal-time-cell{background:var(--surface2);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 5px;font-size:10px;color:var(--text-muted)}
  .cal-time-cell.ot{background:#fffbeb}
  .cal-day-col{display:grid;grid-template-columns:repeat(3,1fr);background:var(--border);gap:1px}
  .cal-day-col.locked{opacity:.5;pointer-events:none}
  .room-cell{background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:44px;cursor:pointer;transition:background .12s;padding:3px;position:relative;user-select:none;-webkit-user-select:none}
  .room-cell:hover:not(.booked):not(.locked-cell){background:#ebfbee}
  .room-cell.booked-mine{background:var(--accent-bg);cursor:default}
  .room-cell.booked-other{background:var(--pro-bg);cursor:default}
  .room-cell.locked-cell{background:#f8f9fa;cursor:not-allowed}
  .room-cell.ot-cell{background:#fffbeb}
  .room-cell.ot-cell:hover:not(.booked):not(.locked-cell){background:#fff3bf}
  .cell-text{font-size:8.5px;text-align:center;line-height:1.3;color:var(--text);max-width:100%;overflow:hidden}
  .cell-del{font-size:8px;padding:1px 4px;margin-top:2px;border-radius:3px;border:1px solid;cursor:pointer;display:inline-block}
  .cell-del.mine{background:var(--accent-bg);color:var(--accent-text);border-color:#a5d8ff}
  .cell-del.admin{background:var(--danger-bg);color:var(--danger-text);border-color:#ffc9c9}

  /* Room sub-headers */
  .room-subhead{display:grid;grid-template-columns:56px repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
  .room-subhead-spacer{border-right:1px solid var(--border)}
  .room-subhead-col{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-right:1px solid var(--border)}
  .room-subhead-item{font-size:8.5px;font-weight:600;text-align:center;padding:2px 1px;background:var(--surface2)}
  .r1{color:#1864ab}.r2{color:#2b8a3e}.r3{color:#862e9c}

  /* Mobile */
  .mobile-view{display:none;padding:.5rem}
  .mob-selects{display:flex;gap:8px;margin-bottom:.75rem}
  .mob-selects select{flex:1}
  .mob-room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden;box-shadow:var(--shadow)}
  .mob-room-head{padding:6px 10px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border)}
  .mob-room-head.r1{background:#e7f5ff;color:#1864ab}
  .mob-room-head.r2{background:#ebfbee;color:#2b8a3e}
  .mob-room-head.r3{background:#f3d9fa;color:#862e9c}
  .mob-slot{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer;transition:background .1s}
  .mob-slot:last-child{border-bottom:none}
  .mob-slot:hover:not(.mob-locked):not(.mob-booked){background:#ebfbee}
  .mob-slot.mob-booked-mine{background:var(--accent-bg)}
  .mob-slot.mob-booked-other{background:var(--pro-bg)}
  .mob-slot.mob-locked{background:#f8f9fa;cursor:not-allowed}
  .mob-slot.mob-ot{background:#fffbeb}
  .mob-time{font-size:11px;color:var(--text-muted);min-width:88px;flex-shrink:0}
  .mob-info{flex:1;font-size:11px}

  /* Legend */
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;padding:.5rem 1rem;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);background:var(--surface)}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text-muted);font-size:13px;gap:10px}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Toast */
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#212529;color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .toast.show{opacity:1}

  @media(max-width:680px){
    .cal-outer,.room-subhead{display:none}
    .mobile-view{display:block}
    .week-nav{display:none}
  }
  @media(min-width:681px){
    .mobile-view{display:none}
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div>載入中…</div>
</div>
<div id="toast" class="toast"></div>

<script>
// ── 設定區 ────────────────────────────────────────────
const FB_URL = 'https://changhua-meeting-default-rtdb.asia-southeast1.firebasedatabase.app';
const ADMIN_PW = 'changhua2024';
const ROOMS = ['第一會議室','第二會議室','第三會議室'];
const HOURS_WORK = [8,9,10,11,12,13,14,15,16];
const HOURS_OT   = [17,18,19,20,21,22,23,0,1,2,3,4,5,6,7];
const DAYS_ZH = ['日','一','二','三','四','五','六'];
// ─────────────────────────────────────────────────────

let state = {
  phase: 'disclaimer',
  user: null,
  bookings: {},
  unlockedDays: {},
  myIds: [],
  weekOffset: 0,
  isAdmin: false,
  lpTimer: null,
};

// ── Firebase REST helpers ─────────────────────────────
async function fbGet(path){
  const r = await fetch(`${FB_URL}/${path}.json`);
  return r.ok ? await r.json() : null;
}
async function fbSet(path, data){
  await fetch(`${FB_URL}/${path}.json`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}
async function fbDelete(path){
  await fetch(`${FB_URL}/${path}.json`, {method:'DELETE'});
}
async function fbPatch(path, data){
  await fetch(`${FB_URL}/${path}.json`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}

async function loadData(){
  try {
    const [b, u] = await Promise.all([fbGet('bookings'), fbGet('unlocked')]);
    state.bookings    = b || {};
    state.unlockedDays = u || {};
  } catch(e) {
    state.bookings = {};
    state.unlockedDays = {};
  }
}

// ── Helpers ───────────────────────────────────────────
function dateKey(d){ return d.toISOString().slice(0,10) }
function isWeekend(d){ const w=d.getDay(); return w===0||w===6 }
function isToday(d){ return dateKey(d)===dateKey(new Date()) }
function slotKey(dk,h,room){ return `${dk}_${h}_${room.replace(/[^a-z0-9]/gi,'_')}` }

function getWeekDates(offset=0){
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow===0?6:dow-1) + offset*7);
  return Array.from({length:7}, (_,i)=>{
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    return d;
  });
}

function showToast(msg, ms=2800){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ── Booking logic ─────────────────────────────────────
function hasConflict(dk,h,room,excludeId=null){
  const k = slotKey(dk,h,room);
  const b = state.bookings[k];
  return b && b.id !== excludeId;
}

async function addBooking(dk,h,room,info){
  if(hasConflict(dk,h,room)){ return false; }
  const id = 'bk_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const data = {id,dk,h,room,...info,ts:Date.now()};
  const k = slotKey(dk,h,room);
  state.bookings[k] = data;
  state.myIds.push(id);
  await fbSet(`bookings/${k}`, data);
  return true;
}

async function deleteBooking(dk,h,room,force=false){
  const k = slotKey(dk,h,room);
  const b = state.bookings[k];
  if(!b) return;
  if(!force && !state.myIds.includes(b.id)){
    showToast('⚠️ 只能取消自己建立的預約');
    return;
  }
  delete state.bookings[k];
  await fbDelete(`bookings/${k}`);
  render();
  showToast('已取消預約');
}

async function unlockDay(dk){
  if(!confirm(`確定要解鎖 ${dk} 的加班時段嗎？`)) return;
  state.unlockedDays[dk] = true;
  await fbSet(`unlocked/${dk.replace(/-/g,'_')}`, true);
  render();
  showToast('已解鎖加班時段');
}

// ── Render ────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  if(state.phase==='disclaimer'){ renderDisclaimer(app); return; }
  if(state.phase==='login'){ renderLogin(app); return; }
  renderMain(app);
}

function renderDisclaimer(app){
  app.innerHTML = `
  <div class="modal-bg">
    <div class="modal">
      <h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        彰化市公所會議室借用系統
      </h2>
      <p>使用前請詳閱以下注意事項：</p>
      <ul>
        <li>本系統供市公所同仁借用 <strong>第一、二、三會議室</strong></li>
        <li>借用前需填寫課室、分機及承辦人資訊</li>
        <li>上班時間 08:00～17:00，每小時一格</li>
        <li>假日或加班需由同仁點選「解鎖加班」</li>
        <li>時段衝突時系統將自動阻擋，請另選時段</li>
        <li>僅可取消<strong>本機瀏覽器</strong>建立的預約</li>
        <li>所有同仁共享同一份即時行事曆</li>
      </ul>
      <p style="font-size:11px;color:#adb5bd">點選「我同意」表示已閱讀並同意遵守上述規範。</p>
      <div class="btn-row">
        <button class="btn" onclick="window.close()">關閉</button>
        <button class="btn primary" onclick="state.phase='login';render()">我同意，開始使用</button>
      </div>
    </div>
  </div>`;
}

function renderLogin(app){
  app.innerHTML = `
  <div class="modal-bg">
    <div class="modal">
      <h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        身份確認
      </h2>
      <p>請填寫基本資訊後進入系統，資訊將顯示於預約記錄上。</p>
      <div class="field"><label>課室 *</label><input id="l-dept" placeholder="例：民政課" /></div>
      <div class="field"><label>分機 *</label><input id="l-ext" type="tel" placeholder="例：1234" /></div>
      <div class="field"><label>承辦人 *</label><input id="l-name" placeholder="例：王小明" /></div>
      <div class="field"><label>備註（選填）</label><textarea id="l-note" placeholder="其他補充資訊"></textarea></div>
      <div class="btn-row">
        <button class="btn" onclick="state.phase='disclaimer';render()">返回</button>
        <button class="btn primary" id="login-btn">進入系統</button>
      </div>
    </div>
  </div>`;
  document.getElementById('login-btn').onclick = doLogin;
  ['l-dept','l-ext','l-name','l-note'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  });
  document.getElementById('l-dept').focus();
}

function doLogin(){
  const dept = document.getElementById('l-dept').value.trim();
  const ext  = document.getElementById('l-ext').value.trim();
  const name = document.getElementById('l-name').value.trim();
  const note = document.getElementById('l-note').value.trim();
  if(!dept||!ext||!name){ showToast('請填寫課室、分機及承辦人'); return; }
  state.user = {dept,ext,name,note};
  state.phase = 'main';
  render();
}

function renderMain(app){
  const dates = getWeekDates(state.weekOffset);
  const d0 = dates[0], d6 = dates[6];
  const weekLabel = `${d0.getFullYear()} 年 ${d0.getMonth()+1}月${d0.getDate()}日 – ${d6.getMonth()+1}月${d6.getDate()}日`;

  app.innerHTML = `
  <div class="header">
    <div class="header-left">
      <h1>彰化市公所 會議室借用系統</h1>
      <p>${state.user.dept}・分機 ${state.user.ext}・${state.user.name}</p>
    </div>
    <span class="badge ${state.isAdmin?'admin':''}">${state.isAdmin?'管理員模式':'一般使用者'}</span>
  </div>

  <div class="week-nav">
    <button class="btn" onclick="state.weekOffset--;render()">◀ 上一週</button>
    <span class="week-label">${weekLabel}</span>
    <button class="btn" onclick="state.weekOffset=0;render()">本週</button>
    <button class="btn" onclick="state.weekOffset++;render()">下一週 ▶</button>
  </div>

  ${buildCalendarHTML(dates)}
  ${buildMobileHTML(dates)}

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e7f5ff;border:1px solid #a5d8ff"></div>我的預約</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f3f0ff;border:1px solid #d0bfff"></div>他人預約</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fffbeb;border:1px solid #ffe066"></div>加班時段</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ebfbee;border:1px solid #a9e34b"></div>可借用（hover）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f8f9fa;border:1px solid #dee2e6"></div>鎖定</div>
  </div>`;

  bindMainEvents();
  buildMobileContent();
}

function buildCalendarHTML(dates){
  const allUnlocked = dates.some(d=>state.unlockedDays[dateKey(d).replace(/-/g,'_')]);
  const hours = allUnlocked ? [...HOURS_WORK,...HOURS_OT] : HOURS_WORK;

  // sub-header (room labels)
  let subhead = `<div class="room-subhead">
    <div class="room-subhead-spacer"></div>
    ${dates.map(d=>`<div class="room-subhead-col">
      ${['一','二','三'].map((n,i)=>`<div class="room-subhead-item r${i+1}">室${n}</div>`).join('')}
    </div>`).join('')}
  </div>`;

  // column headers
  let headRow = `<div class="cal-head-corner"></div>`;
  dates.forEach(d=>{
    const dk = dateKey(d);
    const dkFb = dk.replace(/-/g,'_');
    const we = isWeekend(d);
    const tod = isToday(d);
    const unlocked = state.unlockedDays[dkFb];
    let cls = tod?'today':we?'weekend':'';
    headRow += `<div class="cal-head-cell ${cls}">
      <div class="date">${d.getMonth()+1}/${d.getDate()}</div>
      <div class="weekday">週${DAYS_ZH[d.getDay()]}</div>
      ${we&&!unlocked?`<span class="unlock-btn" onclick="unlockDay('${dk}')">解鎖加班</span>`:''}
      ${we&&unlocked?`<div class="ot-label">加班中</div>`:''}
    </div>`;
  });

  let gridRows = '';
  hours.forEach(h=>{
    const isOT = HOURS_OT.includes(h);
    const hStr = h<10?`0${h}:00`:`${h}:00`;
    gridRows += `<div class="cal-time-cell ${isOT?'ot':''}">${hStr}</div>`;
    dates.forEach(d=>{
      const dk = dateKey(d);
      const dkFb = dk.replace(/-/g,'_');
      const we = isWeekend(d);
      const unlocked = state.unlockedDays[dkFb];
      const dayLocked = we && !unlocked;
      gridRows += `<div class="cal-day-col ${dayLocked?'locked':''}">
        ${ROOMS.map((r,ri)=>{
          const k = slotKey(dk,h,r);
          const b = state.bookings[k];
          const isMine = b && state.myIds.includes(b.id);
          let cls = 'room-cell';
          if(dayLocked) cls += ' locked-cell';
          else if(b){ cls += isMine?' booked-mine':' booked-other'; }
          if(isOT && !dayLocked) cls += ' ot-cell';

          const onclk = (!b && !dayLocked)
            ? `onclick="openBookModal('${dk}',${h},'${r.replace(/'/g,"\\'")}')"` : '';
          const lpAttrs = b
            ? `data-dk="${dk}" data-h="${h}" data-ri="${ri}" data-force="0"` : '';

          return `<div class="${cls}" ${onclk} ${lpAttrs}>
            ${b?`<div class="cell-text">${b.title||''}<br>${b.name}<br>${b.dept}</div>`:''}
            ${b&&isMine?`<div class="cell-del mine" onclick="event.stopPropagation();deleteBooking('${dk}',${h},'${r.replace(/'/g,"\\'")}')">取消</div>`:''}
            ${b&&state.isAdmin&&!isMine?`<div class="cell-del admin" onclick="event.stopPropagation();deleteBooking('${dk}',${h},'${r.replace(/'/g,"\\'")}',true)">強制刪除</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    });
  });

  return `${subhead}
  <div class="cal-outer">
    <div class="cal-grid seven" style="min-width:700px">
      ${headRow}
      ${gridRows}
    </div>
  </div>`;
}

function buildMobileHTML(dates){
  const opts = dates.map(d=>{
    const dk = dateKey(d);
    const we = isWeekend(d);
    const tod = isToday(d);
    return `<option value="${dk}" ${tod?'selected':''}>${d.getMonth()+1}/${d.getDate()} 週${DAYS_ZH[d.getDay()]}${we?' (假日)':''}</option>`;
  }).join('');

  return `<div class="mobile-view">
    <div class="mob-selects">
      <select id="mob-date" onchange="buildMobileContent()">${opts}</select>
    </div>
    <div id="mob-content"></div>
  </div>`;
}

function buildMobileContent(){
  const sel = document.getElementById('mob-date');
  if(!sel) return;
  const dk = sel.value;
  const dkFb = dk.replace(/-/g,'_');
  const d = new Date(dk+'T12:00:00');
  const we = isWeekend(d);
  const unlocked = state.unlockedDays[dkFb];
  const hours = [...HOURS_WORK, ...(unlocked ? HOURS_OT : [])];
  const cont = document.getElementById('mob-content');
  if(!cont) return;

  cont.innerHTML = ROOMS.map((r,ri)=>`
    <div class="mob-room-card">
      <div class="mob-room-head r${ri+1}">${r}</div>
      ${hours.map(h=>{
        const k = slotKey(dk,h,r);
        const b = state.bookings[k];
        const isMine = b && state.myIds.includes(b.id);
        const locked = we && !unlocked;
        const isOT = HOURS_OT.includes(h);
        const hE = (h+1)%24;
        const fmt = x => x<10?`0${x}:00`:`${x}:00`;
        let cls = 'mob-slot';
        if(locked) cls += ' mob-locked';
        else if(b) cls += isMine?' mob-booked-mine':' mob-booked-other';
        else if(isOT) cls += ' mob-ot';
        const onclk = (!b&&!locked) ? `onclick="openBookModal('${dk}',${h},'${r.replace(/'/g,"\\'")}')"`:'';
        return `<div class="${cls}" ${onclk}>
          <span class="mob-time">${fmt(h)}–${fmt(hE)}</span>
          <span class="mob-info">${b?`${b.name}（${b.dept}）`:locked?'假日鎖定':'點選借用'}</span>
          ${b&&isMine?`<button class="btn sm" onclick="event.stopPropagation();deleteBooking('${dk}',${h},'${r.replace(/'/g,"\\'")}')">取消</button>`:''}
          ${b&&state.isAdmin&&!isMine?`<button class="btn sm danger" onclick="event.stopPropagation();deleteBooking('${dk}',${h},'${r.replace(/'/g,"\\'")}',true)">刪除</button>`:''}
        </div>`;
      }).join('')}
      ${we&&!unlocked?`<div class="mob-slot"><span class="mob-time">假日</span><span class="mob-info"><button class="btn sm warning" onclick="unlockDay('${dk}')">申請加班解鎖</button></span></div>`:''}
    </div>`).join('');
}

function bindMainEvents(){
  // Long press for admin on desktop cells
  document.querySelectorAll('.room-cell[data-dk]').forEach(el=>{
    el.addEventListener('pointerdown', e=>{
      const {dk,h,ri} = el.dataset;
      if(!dk) return;
      state.lpTimer = setTimeout(()=>{
        const room = ROOMS[parseInt(ri)];
        const k = slotKey(dk, parseInt(h), room);
        if(state.bookings[k]) showAdminPrompt(dk, parseInt(h), room);
      }, 3000);
    });
    ['pointerup','pointerleave','pointermove'].forEach(ev=>
      el.addEventListener(ev, ()=>clearTimeout(state.lpTimer)));
  });
}

// ── Modals ────────────────────────────────────────────
function openBookModal(dk, h, room){
  const hE = (h+1)%24;
  const fmt = x => x<10?`0${x}:00`:`${x}:00`;
  const ov = document.createElement('div');
  ov.className = 'modal-bg';
  ov.innerHTML = `<div class="modal">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      新增預約
    </h2>
    <p>${room} &nbsp;·&nbsp; ${dk} &nbsp;·&nbsp; ${fmt(h)} – ${fmt(hE)}</p>
    <div class="field"><label>會議名稱 *</label><input id="b-title" placeholder="例：課務協調會議" /></div>
    <div class="field"><label>備註（選填）</label><textarea id="b-note" placeholder="其他補充說明"></textarea></div>
    <p style="font-size:11px;color:#adb5bd">課室：${state.user.dept}・承辦人：${state.user.name}・分機：${state.user.ext}</p>
    <div class="btn-row">
      <button class="btn" onclick="this.closest('.modal-bg').remove()">取消</button>
      <button class="btn primary" id="b-ok">確認借用</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('b-ok').onclick = async ()=>{
    const title = document.getElementById('b-title').value.trim();
    const note  = document.getElementById('b-note').value.trim();
    if(!title){ showToast('請填寫會議名稱'); return; }
    if(hasConflict(dk,h,room)){
      showToast('⚠️ 此時段已被預約，請選擇其他時段'); ov.remove(); render(); return;
    }
    document.getElementById('b-ok').disabled = true;
    document.getElementById('b-ok').textContent = '儲存中…';
    const ok = await addBooking(dk,h,room,{
      title, note,
      dept: state.user.dept,
      ext:  state.user.ext,
      name: state.user.name,
    });
    ov.remove();
    if(ok){ render(); showToast('✓ 預約成功！'); }
    else { render(); showToast('⚠️ 預約衝突，請重新選擇'); }
  };
  setTimeout(()=>document.getElementById('b-title')?.focus(), 60);
}

function showAdminPrompt(dk, h, room){
  const ov = document.createElement('div');
  ov.className = 'modal-bg';
  ov.innerHTML = `<div class="modal">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e67700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      管理員驗證
    </h2>
    <p>輸入管理員密碼後可強制刪除任何預約。</p>
    <div class="field"><label>管理員密碼</label><input id="adm-pw" type="password" placeholder="請輸入密碼" /></div>
    <div class="btn-row">
      <button class="btn" onclick="this.closest('.modal-bg').remove()">取消</button>
      <button class="btn primary" id="adm-ok">驗證並進入管理員模式</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const ok = document.getElementById('adm-ok');
  ok.onclick = ()=>{
    if(document.getElementById('adm-pw').value === ADMIN_PW){
      state.isAdmin = true;
      ov.remove();
      render();
      showToast('✓ 管理員模式啟用，可強制刪除任何預約');
    } else {
      showToast('密碼錯誤');
    }
  };
  document.getElementById('adm-pw').addEventListener('keydown', e=>{ if(e.key==='Enter') ok.click(); });
  setTimeout(()=>document.getElementById('adm-pw')?.focus(), 60);
}

// ── Expose globals ────────────────────────────────────
window.openBookModal = openBookModal;
window.deleteBooking = deleteBooking;
window.unlockDay = unlockDay;
window.buildMobileContent = buildMobileContent;
window.state = state;

// ── Boot ──────────────────────────────────────────────
loadData().then(()=>render());

// Auto-refresh every 60s
setInterval(async ()=>{
  if(state.phase==='main'){
    await loadData();
    render();
  }
}, 60000);
</script>
</body>
</html>
