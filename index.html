<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彰化市公所 會議室借用系統</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;
    --border:#dee2e6;--border-strong:#adb5bd;
    --text:#212529;--text-muted:#6c757d;--text-light:#adb5bd;
    --accent:#1971c2;--accent-bg:#e7f5ff;--accent-text:#1864ab;
    --success:#2f9e44;--success-bg:#ebfbee;
    --warning:#e67700;--warning-bg:#fff3bf;
    --danger:#c92a2a;--danger-bg:#fff5f5;--danger-text:#c92a2a;
    --pro:#6741d9;--pro-bg:#f3f0ff;
    --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  }
  body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;overflow-y:auto}
  .modal{background:var(--surface);border-radius:12px;padding:1.5rem;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);margin:auto}
  .modal h2{font-size:17px;font-weight:600;margin-bottom:.5rem;display:flex;align-items:center;gap:8px}
  .modal p{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:.6rem}
  .modal ul{font-size:13px;color:var(--text-muted);line-height:1.9;padding-left:1.3rem;margin-bottom:.8rem}
  .modal ul li{margin-bottom:2px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn:hover{background:var(--surface2)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#1864ab}
  .btn.primary:disabled{opacity:.5;cursor:not-allowed}
  .btn.danger{background:var(--danger-bg);color:var(--danger-text);border-color:#ffc9c9}
  .btn.danger:hover{background:#ffe3e3}
  .btn.sm{padding:4px 8px;font-size:11px}
  .btn.warning{background:var(--warning-bg);color:var(--warning);border-color:#ffe066}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:1rem}

  /* Form */
  .field{margin-bottom:10px}
  label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;font-weight:500}
  input,select,textarea{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(25,113,194,.12)}
  textarea{resize:vertical;min-height:60px}

  /* Header */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  .header-left h1{font-size:15px;font-weight:600}
  .header-left p{font-size:11px;color:var(--text-muted);margin-top:1px}
  .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-bg);color:var(--accent-text);border:1px solid #a5d8ff;font-weight:500}
  .badge.admin{background:#fff3bf;color:#7c5000;border-color:#ffe066}

  /* Steps */
  .steps{display:flex;align-items:center;gap:6px;padding:.7rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);padding:5px 10px;border-radius:20px;border:1px solid var(--border)}
  .step.active{color:var(--accent-text);background:var(--accent-bg);border-color:#a5d8ff;font-weight:600}
  .step.done{color:var(--success);border-color:#b2f2bb;background:var(--success-bg)}
  .step-num{width:18px;height:18px;border-radius:50%;background:currentColor;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .step-num span{color:#fff}
  .step-arrow{color:var(--text-light);font-size:12px}

  /* Step 1: date picker */
  .date-picker-wrap{padding:1rem}
  .week-nav{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
  .week-nav .week-label{font-size:13px;font-weight:600;flex:1;text-align:center}
  .date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .date-card{border:1px solid var(--border);border-radius:var(--radius);padding:.6rem .3rem;text-align:center;cursor:pointer;transition:all .12s;background:var(--surface)}
  .date-card:hover{border-color:var(--accent);background:var(--accent-bg)}
  .date-card.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .date-card.weekend{background:#fafafa;color:var(--text-muted)}
  .date-card.weekend.unlocked{background:#fffbeb}
  .date-card .dnum{font-size:18px;font-weight:600}
  .date-card .dwk{font-size:11px;color:var(--text-muted);margin-top:1px}
  .date-card .dlock{font-size:9px;margin-top:4px;color:var(--text-light)}
  .date-card .dot{font-size:9px;margin-top:4px;color:var(--warning);font-weight:600}
  @media(max-width:680px){ .date-grid{grid-template-columns:repeat(4,1fr)} }

  /* Step 2: room picker */
  .room-picker-wrap{padding:1rem}
  .room-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  .room-card{border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all .12s;background:var(--surface);text-align:center}
  .room-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .room-card .ricon{font-size:22px;margin-bottom:6px}
  .room-card .rname{font-size:14px;font-weight:600}
  .room-card .rcount{font-size:11px;color:var(--text-muted);margin-top:3px}
  .room-card.r1{border-top:3px solid #1864ab}
  .room-card.r2{border-top:3px solid #2b8a3e}
  .room-card.r3{border-top:3px solid #862e9c}

  /* Step 3: time slot picker */
  .slot-picker-wrap{padding:1rem}
  .slot-hint{font-size:12px;color:var(--text-muted);margin-bottom:.75rem;padding:.6rem .8rem;background:var(--accent-bg);border-radius:var(--radius);border:1px solid #a5d8ff}
  .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:1rem}
  .slot-btn{border:1px solid var(--border);border-radius:var(--radius);padding:10px 6px;text-align:center;cursor:pointer;transition:all .1s;background:var(--surface);font-size:12px}
  .slot-btn:hover:not(.booked):not(.selected){border-color:var(--accent)}
  .slot-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .slot-btn.booked{background:var(--pro-bg);color:var(--pro);border-color:#d0bfff;cursor:not-allowed}
  .slot-btn.booked-mine{background:var(--accent-bg);color:var(--accent-text);border-color:#a5d8ff;cursor:not-allowed}
  .slot-btn.ot{border-style:dashed}
  .slot-btn .stime{font-weight:600;display:block}
  .slot-btn .sinfo{font-size:9px;display:block;margin-top:2px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot-section-label{font-size:11px;color:var(--text-muted);margin:.5rem 0 .4rem;font-weight:600}
  .selection-summary{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--surface2);border-radius:var(--radius);margin-top:.5rem}
  .selection-summary .ssum-text{font-size:13px}
  .selection-summary .ssum-text strong{color:var(--accent-text)}

  /* Existing bookings list (per room/day) */
  .existing-list{margin-top:1rem}
  .existing-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:11px;background:var(--surface2)}
  .existing-item .etime{font-weight:600;color:var(--pro);min-width:75px}
  .existing-item .ename{flex:1;color:var(--text-muted)}

  /* Toast */
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#212529;color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .toast.show{opacity:1}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text-muted);font-size:13px;gap:10px}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* My bookings panel */
  .panel-section{padding:1rem;border-top:1px solid var(--border);background:var(--surface)}
  .panel-section h3{font-size:13px;font-weight:600;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
  .my-booking-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:12px}
  .my-booking-row .mb-info{flex:1}
  .my-booking-row .mb-room{font-weight:600;color:var(--accent-text)}
  .my-booking-row .mb-time{color:var(--text-muted);font-size:11px}
  .empty-hint{font-size:12px;color:var(--text-light);text-align:center;padding:1rem}
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div>載入中…</div>
</div>
<div id="toast" class="toast"></div>

<script>
// ── 設定區 ────────────────────────────────────────────
const FB_URL = 'https://changhua-meeting-default-rtdb.asia-southeast1.firebasedatabase.app';
const ADMIN_PW = 'changhua2024';
const ROOMS = ['第一會議室','第二會議室','第三會議室'];
const HOURS_WORK = [8,9,10,11,12,13,14,15,16];
const HOURS_OT   = [17,18,19,20,21,22,23,0,1,2,3,4,5,6,7];
const DAYS_ZH = ['日','一','二','三','四','五','六'];
// ─────────────────────────────────────────────────────

let state = {
  phase: 'disclaimer',       // disclaimer -> login -> main
  user: null,
  bookings: {},
  unlockedDays: {},
  myIds: [],
  weekOffset: 0,
  isAdmin: false,
  // booking flow
  step: 1,                   // 1=date, 2=room, 3=slots
  selDate: null,
  selRoom: null,
  selSlots: [],               // array of hour numbers
};

// ── Firebase REST helpers ─────────────────────────────
async function fbGet(path){
  try{ const r = await fetch(`${FB_URL}/${path}.json`); return r.ok ? await r.json() : null; }
  catch(e){ return null; }
}
async function fbSet(path, data){
  await fetch(`${FB_URL}/${path}.json`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
}
async function fbDelete(path){
  await fetch(`${FB_URL}/${path}.json`, {method:'DELETE'});
}

async function loadData(){
  const [b,u] = await Promise.all([fbGet('bookings'), fbGet('unlocked')]);
  state.bookings = b || {};
  state.unlockedDays = u || {};
}

// ── Helpers ───────────────────────────────────────────
function dateKey(d){ return d.toISOString().slice(0,10) }
function isWeekend(d){ const w=d.getDay(); return w===0||w===6 }
function isToday(d){ return dateKey(d)===dateKey(new Date()) }
function slotKey(dk,h,room){ return `${dk}_${h}_${room.replace(/[^a-z0-9]/gi,'_')}` }
function fmtH(h){ return h<10?`0${h}:00`:`${h}:00` }

function getWeekDates(offset=0){
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow===0?6:dow-1) + offset*7);
  return Array.from({length:7}, (_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function showToast(msg, ms=2800){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

function hasConflict(dk,h,room,excludeId=null){
  const k = slotKey(dk,h,room);
  const b = state.bookings[k];
  return b && b.id !== excludeId;
}

async function addBooking(dk,h,room,info){
  if(hasConflict(dk,h,room)) return false;
  const id = 'bk_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+h;
  const data = {id,dk,h,room,...info,ts:Date.now()};
  const k = slotKey(dk,h,room);
  state.bookings[k] = data;
  state.myIds.push(id);
  await fbSet(`bookings/${k}`, data);
  return true;
}

async function deleteBooking(dk,h,room,force=false){
  const k = slotKey(dk,h,room);
  const b = state.bookings[k];
  if(!b) return;
  if(!force && !state.myIds.includes(b.id)){ showToast('⚠️ 只能取消自己建立的預約'); return; }
  delete state.bookings[k];
  await fbDelete(`bookings/${k}`);
  render();
  showToast('已取消預約');
}

async function unlockDay(dk){
  if(!confirm(`確定要解鎖 ${dk} 的加班時段嗎？`)) return;
  state.unlockedDays[dk.replace(/-/g,'_')] = true;
  await fbSet(`unlocked/${dk.replace(/-/g,'_')}`, true);
  render();
  showToast('已解鎖加班時段');
}

// ── Render root ───────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  if(state.phase==='disclaimer'){ renderDisclaimer(app); return; }
  if(state.phase==='login'){ renderLogin(app); return; }
  renderMain(app);
}

function renderDisclaimer(app){
  app.innerHTML = `
  <div class="modal-bg"><div class="modal">
    <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>彰化市公所會議室借用系統</h2>
    <p>使用前請詳閱以下注意事項：</p>
    <ul>
      <li>本系統供市公所同仁借用 <strong>第一、二、三會議室</strong></li>
      <li>借用前需填寫課室、分機、承辦人及會議主持人</li>
      <li>上班時間 08:00～17:00，每小時一格，可一次選取多個時段</li>
      <li>假日或加班需由同仁點選「解鎖加班」</li>
      <li>時段衝突時系統將自動阻擋，請另選時段</li>
      <li>僅可取消<strong>本機瀏覽器</strong>建立的預約</li>
      <li>所有同仁共享同一份即時行事曆</li>
    </ul>
    <p style="font-size:11px;color:#adb5bd">點選「我同意」表示已閱讀並同意遵守上述規範。</p>
    <div class="btn-row">
      <button class="btn" onclick="window.close()">關閉</button>
      <button class="btn primary" onclick="state.phase='login';render()">我同意，開始使用</button>
    </div>
  </div></div>`;
}

function renderLogin(app){
  app.innerHTML = `
  <div class="modal-bg"><div class="modal">
    <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>身份確認</h2>
    <p>請填寫基本資訊後進入系統，資訊將顯示於預約記錄上。</p>
    <div class="field"><label>課室 *</label><input id="l-dept" placeholder="例：民政課" /></div>
    <div class="field"><label>分機 *</label><input id="l-ext" type="tel" placeholder="例：1234" /></div>
    <div class="field"><label>承辦人 *</label><input id="l-name" placeholder="例：王小明" /></div>
    <div class="field"><label>備註（選填）</label><textarea id="l-note" placeholder="其他補充資訊"></textarea></div>
    <div class="btn-row">
      <button class="btn" onclick="state.phase='disclaimer';render()">返回</button>
      <button class="btn primary" id="login-btn">進入系統</button>
    </div>
  </div></div>`;
  document.getElementById('login-btn').onclick = doLogin;
  ['l-dept','l-ext','l-name','l-note'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  });
  document.getElementById('l-dept').focus();
}

function doLogin(){
  const dept = document.getElementById('l-dept').value.trim();
  const ext  = document.getElementById('l-ext').value.trim();
  const name = document.getElementById('l-name').value.trim();
  const note = document.getElementById('l-note').value.trim();
  if(!dept||!ext||!name){ showToast('請填寫課室、分機及承辦人'); return; }
  state.user = {dept,ext,name,note};
  state.phase = 'main';
  render();
}

// ── Main / flow ───────────────────────────────────────
function renderMain(app){
  app.innerHTML = `
  <div class="header">
    <div class="header-left">
      <h1>彰化市公所 會議室借用系統</h1>
      <p>${state.user.dept}・分機 ${state.user.ext}・${state.user.name}</p>
    </div>
    <span class="badge ${state.isAdmin?'admin':''}">${state.isAdmin?'管理員模式':'一般使用者'}</span>
  </div>
  ${buildStepsHTML()}
  <div id="step-content"></div>
  <div class="panel-section">
    <h3><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>我的預約</h3>
    <div id="my-bookings"></div>
  </div>
  `;
  renderStepContent();
  renderMyBookings();
}

function buildStepsHTML(){
  const s = state.step;
  const stepDef = (n,label,doneLabel)=>{
    let cls = n===s?'active':n<s?'done':'';
    return `<div class="step ${cls}"><div class="step-num">${n<s?'<span>✓</span>':`<span>${n}</span>`}</div>${n<s&&doneLabel?doneLabel:label}</div>`;
  };
  return `<div class="steps">
    ${stepDef(1,'選擇日期', state.selDate?fmtDateShort(state.selDate):null)}
    <span class="step-arrow">›</span>
    ${stepDef(2,'選擇會議室', state.selRoom)}
    <span class="step-arrow">›</span>
    ${stepDef(3,'選擇時段並填寫資訊')}
    ${state.step>1?`<button class="btn sm" style="margin-left:auto" onclick="resetFlow()">重新選擇</button>`:''}
  </div>`;
}

function fmtDateShort(dk){
  const d = new Date(dk+'T12:00:00');
  return `${d.getMonth()+1}/${d.getDate()} 週${DAYS_ZH[d.getDay()]}`;
}

function resetFlow(){
  state.step = 1; state.selDate = null; state.selRoom = null; state.selSlots = [];
  render();
}

function renderStepContent(){
  const c = document.getElementById('step-content');
  if(!c) return;
  if(state.step===1) c.innerHTML = buildDateStepHTML();
  if(state.step===2) c.innerHTML = buildRoomStepHTML();
  if(state.step===3) c.innerHTML = buildSlotStepHTML();
  if(state.step===1) bindDateStepEvents();
}

// Step 1: pick date
function buildDateStepHTML(){
  const dates = getWeekDates(state.weekOffset);
  const d0=dates[0], d6=dates[6];
  const weekLabel = `${d0.getFullYear()}年 ${d0.getMonth()+1}/${d0.getDate()} – ${d6.getMonth()+1}/${d6.getDate()}`;
  return `<div class="date-picker-wrap">
    <div class="week-nav">
      <button class="btn sm" onclick="state.weekOffset--;renderStepContent()">◀ 上一週</button>
      <span class="week-label">${weekLabel}</span>
      <button class="btn sm" onclick="state.weekOffset=0;renderStepContent()">本週</button>
      <button class="btn sm" onclick="state.weekOffset++;renderStepContent()">下一週 ▶</button>
    </div>
    <div class="date-grid">
      ${dates.map(d=>{
        const dk = dateKey(d);
        const dkFb = dk.replace(/-/g,'_');
        const we = isWeekend(d);
        const tod = isToday(d);
        const unlocked = state.unlockedDays[dkFb];
        let cls = tod?'today':''; if(we) cls += ' weekend'; if(we&&unlocked) cls += ' unlocked';
        return `<div class="date-card ${cls}" data-dk="${dk}" data-we="${we?1:0}" data-unlocked="${unlocked?1:0}">
          <div class="dnum">${d.getDate()}</div>
          <div class="dwk">週${DAYS_ZH[d.getDay()]}</div>
          ${we&&!unlocked?`<div class="dlock">需解鎖</div>`:''}
          ${we&&unlocked?`<div class="dot">加班中</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function bindDateStepEvents(){
  document.querySelectorAll('.date-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      const dk = el.dataset.dk;
      const we = el.dataset.we==='1';
      const unlocked = el.dataset.unlocked==='1';
      if(we && !unlocked){
        if(confirm(`${fmtDateShort(dk)} 是假日，需先解鎖加班時段才能借用。是否現在解鎖？`)){
          unlockDay(dk).then(()=>{
            state.selDate = dk; state.step = 2; render();
          });
        }
        return;
      }
      state.selDate = dk;
      state.step = 2;
      render();
    });
  });
}

// Step 2: pick room
function buildRoomStepHTML(){
  const dk = state.selDate;
  return `<div class="room-picker-wrap">
    <div class="slot-hint">已選日期：<strong>${fmtDateShort(dk)}</strong>，請選擇要借用的會議室</div>
    <div class="room-cards">
      ${ROOMS.map((r,i)=>{
        const cnt = countBookingsForRoom(dk,r);
        return `<div class="room-card r${i+1}" onclick="pickRoom('${r.replace(/'/g,"\\'")}')">
          <div class="rname">${r}</div>
          <div class="rcount">當日已有 ${cnt} 個時段被預約</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function countBookingsForRoom(dk,room){
  let n = 0;
  [...HOURS_WORK,...HOURS_OT].forEach(h=>{
    if(state.bookings[slotKey(dk,h,room)]) n++;
  });
  return n;
}

function pickRoom(room){
  state.selRoom = room;
  state.selSlots = [];
  state.step = 3;
  render();
}

// Step 3: pick slots (multi-select, contiguous) + form
function buildSlotStepHTML(){
  const dk = state.selDate, room = state.selRoom;
  const dkFb = dk.replace(/-/g,'_');
  const unlocked = state.unlockedDays[dkFb];
  const hours = unlocked ? [...HOURS_WORK,...HOURS_OT] : HOURS_WORK;

  const existing = [];
  [...HOURS_WORK,...HOURS_OT].forEach(h=>{
    const b = state.bookings[slotKey(dk,h,room)];
    if(b) existing.push({h,...b});
  });
  existing.sort((a,b)=>{
    const av = a.h<8?a.h+24:a.h, bv = b.h<8?b.h+24:b.h;
    return av-bv;
  });

  return `<div class="slot-picker-wrap">
    <div class="slot-hint">已選 <strong>${fmtDateShort(dk)} · ${room}</strong>，請點選欲借用的時段（可連續多選），完成後填寫借用資訊</div>

    <div class="slot-section-label">上班時間 08:00–17:00</div>
    <div class="slot-grid">
      ${HOURS_WORK.map(h=>buildSlotBtn(dk,room,h,false)).join('')}
    </div>

    ${unlocked?`
    <div class="slot-section-label">加班時段 17:00–08:00</div>
    <div class="slot-grid">
      ${HOURS_OT.map(h=>buildSlotBtn(dk,room,h,true)).join('')}
    </div>`:''}

    <div class="selection-summary">
      <div class="ssum-text">已選擇 <strong>${state.selSlots.length}</strong> 個時段${state.selSlots.length?'：'+formatSelectedRange():''}</div>
      <button class="btn primary" id="proceed-btn" ${state.selSlots.length===0?'disabled':''} onclick="openBookForm()">填寫借用資訊</button>
    </div>

    ${existing.length?`
    <div class="existing-list">
      <div class="slot-section-label">本日 ${room} 已有預約</div>
      ${existing.map(b=>`<div class="existing-item">
        <span class="etime">${fmtH(b.h)}–${fmtH((b.h+1)%24)}</span>
        <span class="ename">${b.title||''}（${b.name}・${b.dept}）${b.host?'・主持人：'+b.host:''}</span>
      </div>`).join('')}
    </div>`:''}
  </div>`;
}

function buildSlotBtn(dk,room,h,isOT){
  const k = slotKey(dk,h,room);
  const b = state.bookings[k];
  const isMine = b && state.myIds.includes(b.id);
  const isSel = state.selSlots.includes(h);
  let cls = 'slot-btn';
  if(isOT) cls += ' ot';
  if(b) cls += isMine?' booked-mine':' booked';
  else if(isSel) cls += ' selected';
  const onclk = !b ? `onclick="toggleSlot(${h})"` : '';
  return `<div class="${cls}" ${onclk}>
    <span class="stime">${fmtH(h)}</span>
    <span class="sinfo">${b?(b.name||''):isSel?'已選取':'空白'}</span>
  </div>`;
}

function formatSelectedRange(){
  const sorted = [...state.selSlots].sort((a,b)=>{
    const av=a<8?a+24:a, bv=b<8?b+24:b; return av-bv;
  });
  return sorted.map(h=>fmtH(h)).join('、');
}

function toggleSlot(h){
  const dk = state.selDate, room = state.selRoom;
  if(hasConflict(dk,h,room)) return;
  const idx = state.selSlots.indexOf(h);
  if(idx>=0) state.selSlots.splice(idx,1);
  else state.selSlots.push(h);
  renderStepContent();
}

function openBookForm(){
  if(state.selSlots.length===0) return;
  const dk = state.selDate, room = state.selRoom;
  const sorted = [...state.selSlots].sort((a,b)=>{ const av=a<8?a+24:a, bv=b<8?b+24:b; return av-bv; });
  const rangeText = sorted.map(h=>`${fmtH(h)}–${fmtH((h+1)%24)}`).join('、');

  const ov = document.createElement('div');
  ov.className = 'modal-bg';
  ov.innerHTML = `<div class="modal">
    <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>新增預約</h2>
    <p>${room} ・ ${fmtDateShort(dk)} ・ 共 ${sorted.length} 個時段</p>
    <p style="font-size:12px;background:var(--surface2);padding:6px 10px;border-radius:6px">${rangeText}</p>
    <div class="field"><label>會議名稱 *</label><input id="b-title" placeholder="例：課務協調會議" /></div>
    <div class="field"><label>會議主持人 *</label><input id="b-host" placeholder="例：陳課長" /></div>
    <div class="field"><label>備註（選填）</label><textarea id="b-note" placeholder="其他補充說明"></textarea></div>
    <p style="font-size:11px;color:#adb5bd">課室：${state.user.dept}・承辦人：${state.user.name}・分機：${state.user.ext}</p>
    <div class="btn-row">
      <button class="btn" onclick="this.closest('.modal-bg').remove()">取消</button>
      <button class="btn primary" id="b-ok">確認借用</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('b-ok').onclick = async ()=>{
    const title = document.getElementById('b-title').value.trim();
    const host  = document.getElementById('b-host').value.trim();
    const note  = document.getElementById('b-note').value.trim();
    if(!title){ showToast('請填寫會議名稱'); return; }
    if(!host){ showToast('請填寫會議主持人'); return; }

    const conflictHour = sorted.find(h=>hasConflict(dk,h,room));
    if(conflictHour!==undefined){
      showToast(`⚠️ ${fmtH(conflictHour)} 時段已被預約，請重新選擇`);
      ov.remove(); state.selSlots=[]; render(); return;
    }

    document.getElementById('b-ok').disabled = true;
    document.getElementById('b-ok').textContent = '儲存中…';

    let allOk = true;
    for(const h of sorted){
      const ok = await addBooking(dk,h,room,{
        title, host, note,
        dept: state.user.dept, ext: state.user.ext, name: state.user.name,
      });
      if(!ok) allOk = false;
    }
    ov.remove();
    state.selSlots = [];
    state.step = 1; state.selDate = null; state.selRoom = null;
    render();
    showToast(allOk?'✓ 預約成功！':'⚠️ 部分時段預約失敗（已被搶先預約）');
  };
  setTimeout(()=>document.getElementById('b-title')?.focus(), 60);
}

// My bookings panel
function renderMyBookings(){
  const c = document.getElementById('my-bookings');
  if(!c) return;
  const mine = Object.values(state.bookings).filter(b=>state.myIds.includes(b.id));
  mine.sort((a,b)=>a.ts-b.ts);
  if(mine.length===0){ c.innerHTML = `<div class="empty-hint">尚無預約記錄</div>`; return; }
  c.innerHTML = mine.map(b=>`
    <div class="my-booking-row">
      <div class="mb-info">
        <span class="mb-room">${b.room}</span> · ${b.title}（主持人：${b.host||'未填'}）
        <div class="mb-time">${b.dk} ${fmtH(b.h)}–${fmtH((b.h+1)%24)}</div>
      </div>
      <button class="btn sm" onclick="deleteBooking('${b.dk}',${b.h},'${b.room.replace(/'/g,"\\'")}')">取消</button>
    </div>`).join('');
}

// ── Expose globals ────────────────────────────────────
window.pickRoom = pickRoom;
window.toggleSlot = toggleSlot;
window.openBookForm = openBookForm;
window.deleteBooking = deleteBooking;
window.unlockDay = unlockDay;
window.resetFlow = resetFlow;
window.state = state;

// ── Boot ──────────────────────────────────────────────
loadData().then(()=>render());

setInterval(async ()=>{
  if(state.phase==='main' && state.step!==3){
    await loadData();
    render();
  }
}, 60000);
</script>
</body>
</html>
